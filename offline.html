<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>زدن الفرارررررر</title>

<style>
    body {
        margin: 0;
        font-family: Tahoma, Arial;
        background: linear-gradient(135deg, #1e1e2f, #2b2b45);
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        text-align: center;
    }

    .box {
        background: rgba(255,255,255,0.08);
        padding: 40px;  
        border-radius: 20px;
        box-shadow: 0 0 20px rgba(0,0,0,0.4);
        backdrop-filter: blur(8px);
        max-width: 400px;
    }

    h1 {
        font-size: 32px;
        margin-bottom: 10px;
    }

    p {
        font-size: 16px;
        opacity: 0.8;
    }

    .emoji {
        font-size: 50px;
        margin-bottom: 10px;
    }

    .btn {
        margin-top: 20px;
        display: inline-block;
        padding: 10px 20px;
        background: #4f7cff;
        color: white;
        border-radius: 12px;
        text-decoration: none;
        transition: 0.3s;
    }

    .btn:hover {
        background: #2f5fff;
    }
</style>

</head>

<body>

<div class="box">
    <div class="emoji">💥💥💥💥</div>
    <h1>زدنننننننننننننننننن</h1>
</div>

</body>
</html>
